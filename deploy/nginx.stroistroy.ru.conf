# nginx reverse proxy for stroistroy.ru
# Place in /etc/nginx/sites-available/stroistroy.ru

server {
    listen 80;
    listen [::]:80;
    server_name stroistroy.ru www.stroistroy.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://stroistroy.ru$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name stroistroy.ru www.stroistroy.ru;

    ssl_certificate     /etc/letsencrypt/live/stroistroy.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stroistroy.ru/privkey.pem;

    # Redirect www → apex
    if ($host = www.stroistroy.ru) {
        return 301 https://stroistroy.ru$request_uri;
    }

    client_max_body_size 2m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
