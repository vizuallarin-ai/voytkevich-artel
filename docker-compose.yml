services:
  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://stroistroy.ru}
        NEXT_PUBLIC_YM_ID: ${NEXT_PUBLIC_YM_ID:-}
        NEXT_PUBLIC_GA_ID: ${NEXT_PUBLIC_GA_ID:-}
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - stroistroy-data:/app/.data

volumes:
  stroistroy-data:
